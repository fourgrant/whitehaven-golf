name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject config
        run: |
          cat > config.js << 'EOF'
          const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          const COMMISH_PASSWORD = '${{ secrets.COMMISH_PASSWORD }}';
          EOF
          # Remove config.js from .gitignore so peaceiris picks it up
          sed -i '/^config\.js$/d' .gitignore

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,config.example.js'
